theme: jekyll-theme-chirpy

lang: en
timezone: America/New_York

# Build posts dated slightly ahead of the CI build clock (avoids future-dated posts 404ing)
future: true

title: Junghwan (Steve) Kim
tagline: Data center, AI infrastructure, networking, and HPC notes from a graduate researcher
description: >-
  Engineering notes on data centers, AI infrastructure, datacenter networking,
  high performance computing (HPC), NCCL, and GPU clusters. Written by Junghwan
  (Steve) Kim, a graduate researcher and engineer open to AI infrastructure and
  data center internships and new graduate roles.

url: "https://baobabtr33.github.io"
baseurl: "/blog"

github:
  username: baobabtr33

social:
  name: Junghwan (Steve) Kim
  email: stevekim01310@gmail.com
  links:
    - https://www.linkedin.com/in/junghwan-kim-6293741a5/
    - https://github.com/baobabtr33

# Sidebar profile photo.
avatar: /assets/img/cover-face-linkedin.jpg

# Default image used when a page is shared on social platforms.
social_preview_image: /assets/img/cover-face-linkedin.jpg

# null = auto (follow OS), or "light" / "dark"
theme_mode:

analytics:
  google:
    id: G-6RRC3L5LE1

# Site verification settings — fill in IDs to verify ownership.
webmaster_verifications:
  google: # Search Console verification meta tag content
  bing: # Bing Webmaster Tools verification id
  alexa:
  yandex:
  baidu:
  facebook:

# Table of contents on the right sidebar of posts
toc: true

paginate: 10

markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

plugins:
  - jekyll-redirect-from

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - "*.pdf"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - draft
  - ideas.md

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
